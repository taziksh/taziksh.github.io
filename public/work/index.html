<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Work | Tazik</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff;
        --ink: #222222;
        --ink-strong: #181818;
        --muted: #8a8a8a;
        --accent: #7b68ee;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1e1e1e;
          --ink: #dadada;
          --ink-strong: #eaeaea;
          --muted: #888888;
          --accent: #a18bf0;
        }
      }
      * { box-sizing: border-box; }
      body {
        background: var(--bg);
        color: var(--ink);
        margin: 0;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        line-height: 1.7;
      }
      main {
        max-width: 640px;
        margin: 0 auto;
        padding: 3rem 1.5rem 6rem;
      }
      .home {
        font-size: 1rem;
        color: var(--muted);
        text-decoration: none;
        display: inline-block;
        padding: 0.6rem 0.8rem;
        margin: -0.6rem -0.8rem;
      }
      .home:hover { color: var(--accent); }
      h1 {
        font-family: 'Fraunces', serif;
        font-optical-sizing: auto;
        font-weight: 500;
        font-size: 1.6rem;
        margin: 2.5rem 0 0.75rem;
        color: var(--ink-strong);
      }
      ul {
        list-style: disc;
        padding-left: 1.25rem;
        margin: 0;
      }
      ul ul { list-style: circle; }
      li { padding: 0.15rem 0; }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover { text-decoration: underline; }
      .flags {
        font-size: 1.7rem;
        line-height: 1.5;
        letter-spacing: 0.3rem;
        margin: 0;
      }
      .sample-note { color: var(--muted); font-size: 0.75rem; margin: 0.25rem 0 0; }
    </style>
  </head>
  <body>
    <main>
      <a class="home" href="/" aria-label="home">~/</a>

      <h1>things I'm doing</h1>
      <ul>
        <li>
          building <a href="https://tryclearly.app">Clearly</a>, app for chronic illness
          (<a href="https://www.reddit.com/r/eczema/comments/1l8xacx/got_fed_up_with_my_skin_made_something_to/">#1 on r/eczema</a>)
        </li>
      </ul>

      <h1>things I've done</h1>
      <ul>
        <li>co-authored the <a href="https://arxiv.org/abs/2404.05553">world's largest EEG-to-image dataset</a> at CVPR</li>
        <li>eng #2 at <a href="https://www.ycombinator.com/companies/bronco-ai">Bronco</a> (YC S23)</li>
        <li>helped <a href="https://www.pramana.ai/mayo">Mayo Clinic digitize 5 million cancer slides</a></li>
        <li>studied <a href="https://uwaterloo.ca/electrical-computer-engineering/">computer engineering at Waterloo</a></li>
      </ul>

    </main>
  </body>
</html>
