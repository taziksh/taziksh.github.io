<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="favicon.ico" />
    <title>Tazik — Work</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
      /* ── Reset the global * { background: black } from style.css ── */
      body,
      body *:not(.popover):not(.popover *) {
        background-color: transparent !important;
      }
      body {
        background: #0a0a0a !important;
        min-height: 100vh;
      }

      /* ── Layout ── */
      .container {
        height: auto;
        max-width: 560px;
        margin: 0 auto;
        padding: 2.5rem 1.5rem 6rem;
        align-items: flex-start;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        margin-bottom: 5rem;
      }
      .title {
        font-family: monospace;
        margin: 0;
        font-size: 1em;
        font-weight: normal;
        color: white;
      }
      .nav {
        display: flex;
        align-items: center;
        gap: 20px;
        justify-content: flex-end;
      }
      .nav a {
        font-family: monospace;
        font-size: 1em;
        font-weight: normal;
        color: #3b9df3;
        text-decoration: none;
      }
      .nav a:hover {
        color: #6bb5f7;
      }

      /* ── Prose ── */
      .prose {
        font-family: "HK Grotesk", system-ui, -apple-system, sans-serif;
        font-size: 1.15rem;
        line-height: 2;
        color: #b0b0b0;
        margin-bottom: 1.25rem;
      }

      /* ── Badge (inline pill) ── */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 10px 3px 7px;
        background: #161616 !important;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 100px;
        font-family: "HK Grotesk", system-ui, sans-serif;
        font-size: 0.82em;
        font-weight: 500;
        color: #e8e8e8;
        text-decoration: none;
        vertical-align: middle;
        position: relative;
        cursor: pointer;
        transition: border-color 0.25s ease, background 0.25s ease;
        white-space: nowrap;
        letter-spacing: 0.01em;
      }
      .badge:hover {
        border-color: rgba(255,255,255,0.18);
        background: #1e1e1e !important;
      }
      .badge img {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        flex-shrink: 0;
      }

      /* ── Popover ── */
      .popover {
        visibility: hidden;
        opacity: 0;
        position: absolute;
        bottom: calc(100% + 12px);
        left: 50%;
        transform: translateX(-50%) translateY(4px);
        background: #161616 !important;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 10px;
        padding: 14px 16px;
        width: 240px;
        z-index: 100;
        box-shadow:
          0 8px 32px rgba(0,0,0,0.6),
          0 0 0 1px rgba(255,255,255,0.03);
        white-space: normal;
        text-align: left;
        cursor: default;
        transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
        pointer-events: none;
      }
      .badge:hover .popover {
        visibility: visible;
        opacity: 1;
        transform: translateX(-50%) translateY(0);
        pointer-events: auto;
      }
      /* arrow */
      .popover::after {
        content: '';
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        border: 6px solid transparent;
        border-top-color: rgba(255,255,255,0.08);
      }
      .popover::before {
        content: '';
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        border: 5px solid transparent;
        border-top-color: #161616;
        z-index: 1;
      }
      /* invisible bridge so hover doesn't break when moving to popover */
      .badge::after {
        content: '';
        position: absolute;
        bottom: 100%;
        left: 0;
        right: 0;
        height: 14px;
      }

      .popover-role {
        font-family: "HK Grotesk", system-ui, sans-serif;
        font-size: 0.72rem;
        font-weight: 500;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 6px;
      }
      .popover-detail {
        font-family: "HK Grotesk", system-ui, sans-serif;
        font-size: 0.82rem;
        color: #aaa;
        line-height: 1.5;
      }
      .popover-action {
        display: inline-block;
        margin-top: 10px;
        font-family: "HK Grotesk", system-ui, sans-serif;
        font-size: 0.72rem;
        color: #3b9df3;
        text-decoration: none;
        cursor: pointer;
        transition: color 0.15s;
      }
      .popover-action:hover {
        color: #6bb5f7;
      }

      /* ── Popover content backgrounds ── */
      .popover,
      .popover * {
        background: #161616 !important;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1 class="title">$ tazik</h1>
        <nav class="nav">
          <a href="index.html">home</a>
          <a href="/notes">notes</a>
          <a href="https://github.com/taziksh">bits</a>
          <a href="work.html">work</a>
        </nav>
      </div>

      <p class="prose">
        [your copy here]
        <span class="badge badge--text" data-href="https://tryclearly.app">
          Clearly
          <span class="popover">
            <span class="popover-role">Founder</span>
            <span class="popover-detail">[detail]</span>
          </span>
        </span>
        [your copy here]
        <span class="badge" data-href="https://ideaflow.io">
          <img src="https://www.google.com/s2/favicons?domain=ideaflow.io&sz=32" alt="">
          Ideaflow
          <span class="popover">
            <span class="popover-role">Contract</span>
            <span class="popover-detail">[detail]</span>
            <span class="popover-action" data-href="https://ideaflow.io">Open Ideaflow &rarr;</span>
          </span>
        </span>
      </p>

      <p class="prose">
        [your copy here]
        <span class="badge" data-href="https://www.youtube.com/watch?v=TIcxqMdZZNE">
          <img src="https://www.google.com/s2/favicons?domain=bronco.ai&sz=32" alt="">
          Bronco AI
          <span class="popover">
            <span class="popover-role">Software Engineer</span>
            <span class="popover-detail">[detail]</span>
          </span>
        </span>
        [your copy here]
        <span class="badge" data-href="https://www.alljoined.com">
          <img src="https://www.google.com/s2/favicons?domain=alljoined.com&sz=32" alt="">
          AllJoined
          <span class="popover">
            <span class="popover-role">Researcher</span>
            <span class="popover-detail">[detail]</span>
            <span class="popover-action" data-href="https://www.alljoined.com">Open AllJoined &rarr;</span>
          </span>
        </span>
      </p>
    </div>

    <script>
      // Handle clicks via data-href (avoids nested <a> issues)
      document.querySelectorAll('[data-href]').forEach(el => {
        el.addEventListener('click', e => {
          if (e.target.closest('.popover') && !e.target.hasAttribute('data-href')) return;
          const href = e.target.closest('[data-href]').dataset.href;
          if (href) window.open(href, '_blank');
        });
      });
    </script>
  </body>
</html>
