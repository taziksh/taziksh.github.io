<!DOCTYPE html>

  <head>
    <meta charset="utf-8" />

    <link rel="icon" href="favicon.ico" />

    <title>Tazik</title>

    <link rel="stylesheet" href="/style.css" />

    <script src="/script.js" defer></script>
    <style>
      canvas#starmap {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        height: auto;
        padding: 40px;
      }
      .container, .container * {
        background: transparent !important;
      }
      .location-info {
        position: fixed;
        bottom: 20px;
        right: 20px;
        font-family: monospace;
        font-size: 9px;
        color: white;
        z-index: 2;
        background: transparent !important;
      }
      .content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
      }
      .title {
        font-family: monospace;
        margin: 0;
        font-size: 1em;
        font-weight: normal;
      }
      .nav {
        justify-content: flex-end;
      }
      .nav h3 {
        font-size: 1em;
        font-weight: normal;
      }

      .work {
        margin-top: 3rem;
        width: 100%;
        max-width: 420px;
      }
      .work-heading {
        font-family: monospace;
        font-size: 1em;
        font-weight: normal;
        color: #666;
        margin-bottom: 0.5rem;
      }
      .work-list {
        list-style: none;
        padding: 0;
        margin: 0 0 1.5rem 0;
      }
      .work-list li {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.25rem 0;
        font-family: monospace;
        font-size: 0.85em;
        color: #ccc;
      }
      .work-list li img.favicon {
        width: 14px;
        height: 14px;
        border-radius: 2px;
        flex-shrink: 0;
      }
      .work-list li a {
        color: #3b9df3;
        font-size: inherit;
      }
      .work-list li .work-desc {
        color: #888;
      }
    </style>
  </head>
  <body>
    <canvas id="starmap"></canvas>
    <div class="location-info" id="location-info">locating...</div>
    <div class="container">
      <div class="content" role="main">
